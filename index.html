<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Icon Search - Feather &amp; Lucide Icons</title>
<meta name="description" content="Search, preview and download Feather and Lucide icons. Customize size, color and stroke width. Export as SVG, PNG or copy code.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--surface:#1f2544;--surface2:#2a2f5b;--border:#2a2f5b;--text:#e4e4e7;--text2:#a1a1aa;--accent:#6c63ff;--accent2:#7c74ff;--accent-glow:rgba(108,99,255,.15);--danger:#ef4444;--success:#22c55e;--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,.3)}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;scroll-behavior:smooth}
body{min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#fff;white-space:nowrap}
.logo svg{width:28px;height:28px;color:var(--accent)}
.logo span{background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.search-wrap{flex:1;min-width:280px;max-width:560px;position:relative}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text2);pointer-events:none}
.search-input{width:100%;padding:11px 44px 11px 42px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-input::placeholder{color:var(--text2)}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:var(--border);border:none;border-radius:50%;color:var(--text2);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:13px;line-height:1}
.search-clear.show{display:flex}
.controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.control-group input[type="range"]{width:80px;accent-color:var(--accent);cursor:pointer}
.control-group input[type="color"]{width:32px;height:32px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:transparent;padding:2px}
.control-group input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
.control-group input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
.control-val{font-size:12px;color:var(--accent);min-width:28px;text-align:center;font-variant-numeric:tabular-nums}
.filters{max-width:1400px;margin:0 auto;padding:16px 24px 0;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-count{font-size:11px;opacity:.7;margin-left:4px}
.main{flex:1;max-width:1400px;margin:0 auto;padding:16px 24px 40px;width:100%}
.stats{padding:8px 0 16px;font-size:13px;color:var(--text2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.icon-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;position:relative}
.icon-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.icon-card .icon-preview{display:flex;align-items:center;justify-content:center;width:48px;height:48px}
.icon-card .icon-preview svg{width:100%;height:100%}
.icon-card .icon-name{font-size:11px;color:var(--text2);text-align:center;word-break:break-all;line-height:1.3;max-height:2.6em;overflow:hidden}
.icon-card .icon-lib{position:absolute;top:6px;right:6px;font-size:9px;padding:1px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.icon-card .icon-lib.feather{background:rgba(34,197,94,.12);color:#22c55e}
.icon-card .icon-lib.lucide{background:rgba(249,115,22,.12);color:#f97316}
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty svg{width:64px;height:64px;margin-bottom:16px;opacity:.4}
.empty p{font-size:16px;margin-bottom:4px}
.empty small{font-size:13px;opacity:.6}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.modal-header .lib-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.modal-header .lib-badge.feather{background:rgba(34,197,94,.12);color:#22c55e}
.modal-header .lib-badge.lucide{background:rgba(249,115,22,.12);color:#f97316}
.modal-close{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--danger);border-color:var(--danger);color:#fff}
.modal-body{padding:24px}
.modal-preview{display:flex;align-items:center;justify-content:center;padding:32px;background:var(--surface);border-radius:var(--radius);margin-bottom:16px;border:1px dashed var(--border)}
.modal-preview svg{transition:all .3s}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.modal-tags .tag{font-size:11px;padding:2px 10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text2)}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.btn{padding:9px 18px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#16a34a}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:12px;color:var(--text2);overflow-x:auto;white-space:pre;line-height:1.6;max-height:200px;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;z-index:300;transition:transform .3s ease;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:24px;font-size:12px;color:var(--text2);border-top:1px solid var(--border)}
@media(max-width:768px){
.header-inner{gap:12px}
.search-wrap{min-width:100%;order:3}
.controls{order:4;width:100%}
.grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.modal{max-width:100%;border-radius:12px}
}
</style>
</head>
<body>

<header class="header">
<div class="header-inner">
<div class="logo">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<span>AI Icon Search</span>
</div>
<div class="search-wrap">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" class="search-input" id="searchInput" placeholder="Search icons... (e.g. arrow, user, heart)" autocomplete="off" autofocus>
<button class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
</div>
<div class="controls">
<div class="control-group">
<label>Size</label>
<input type="range" id="sizeRange" min="16" max="64" value="24">

</div>
<div class="control-group">

<input type="range" id="strokeRange" min="0.5" max="4" step="0.25" value="2">
<span class="control-val" id="strokeVal">2</span>
</div>
<div class="control-group">
<label>Color</label>
<input type="color" id="colorPicker" value="#e4e4e7">
</div>
</div>
</div>
</header>

<div class="filters" id="filters">
<button class="filter-btn active" data-filter="all">All<span class="filter-count" id="countAll"></span></button>
<button class="filter-btn" data-filter="feather">Feather<span class="filter-count" id="countFeather"></span></button>
<button class="filter-btn" data-filter="lucide">Lucide<span class="filter-count" id="countLucide"></span></button>
</div>

<main class="main">
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
<p>No icons found</p>
<small>Try a different search term</small>
</div>
</main>

<div class="modal-overlay" id="modalOverlay">
<div class="modal" role="dialog" aria-modal="true">
<div class="modal-header">
<h3 id="modalTitle"></h3>
<button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
</div>
<div class="modal-body">
<div class="modal-preview" id="modalPreview"></div>
<div class="modal-tags" id="modalTags"></div>
<div class="modal-actions">
<button class="btn btn-primary" id="btnSvgDownload">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
SVG
</button>
<button class="btn btn-success" id="btnPngDownload">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
PNG
</button>
<button class="btn btn-secondary" id="btnCopyCode">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
Copy SVG
</button>
</div>
<div class="code-block">
<div class="code-header">
<span>SVG Code</span>
<button class="code-copy" id="btnCodeCopy">Copy</button>
</div>
<pre id="codeContent"></pre>
</div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

const ALL_ICONS = [
  ...FEATHER_ICONS.map(i => ({...i, lib: 'feather'})),
  ...LUCIDE_ICONS.map(i => ({...i, lib: 'lucide'}))
];

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const searchInput = $('#searchInput');
const searchClear = $('#searchClear');
const grid = $('#grid');
const empty = $('#empty');
const stats = $('#stats');
const modalOverlay = $('#modalOverlay');
const modalTitle = $('#modalTitle');
const modalPreview = $('#modalPreview');
const modalTags = $('#modalTags');
const codeContent = $('#codeContent');
const sizeRange = $('#sizeRange');
const sizeVal = $('#sizeVal');
const strokeRange = $('#strokeRange');
const strokeVal = $('#strokeVal');
const colorPicker = $('#colorPicker');

let currentFilter = 'all';
let currentIcon = null;

function getIconSize() { return parseInt(sizeRange.value); }
function getStrokeWidth() { return parseFloat(strokeRange.value); }
function getColor() { return colorPicker.value; }

function makeSVG(icon, size, strokeWidth, color) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">${icon.svg}</svg>`;
}

function renderGrid() {
  const query = searchInput.value.toLowerCase().trim();
  const tokens = query.split(/\s+/).filter(Boolean);

  let filtered = ALL_ICONS;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(i => i.lib === currentFilter);
  }
  if (tokens.length) {
    filtered = filtered.filter(icon => {
      const haystack = [icon.name, ...icon.tags, icon.lib].join(' ').toLowerCase();
      return tokens.every(t => haystack.includes(t));
    });
  }

  searchClear.classList.toggle('show', query.length > 0);

  const featherCount = ALL_ICONS.filter(i => i.lib === 'feather').length;
  const lucideCount = ALL_ICONS.filter(i => i.lib === 'lucide').length;
  $('#countAll').textContent = `(${ALL_ICONS.length})`;
  $('#countFeather').textContent = `(${featherCount})`;
  $('#countLucide').textContent = `(${lucideCount})`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    grid.style.display = 'none';
    empty.style.display = 'block';
    stats.textContent = 'No icons match your search';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';
  stats.textContent = `Showing ${filtered.length} of ${ALL_ICONS.length} icons`;

  const size = getIconSize();
  const strokeWidth = getStrokeWidth();
  const color = getColor();

  grid.innerHTML = filtered.map((icon, idx) => `
    <div class="icon-card" data-index="${ALL_ICONS.indexOf(icon)}" tabindex="0" role="button" aria-label="${icon.name}">
      <span class="icon-lib ${icon.lib}">${icon.lib === 'feather' ? 'F' : 'L'}</span>
      <div class="icon-preview">${makeSVG(icon, size, strokeWidth, color)}</div>
      <div class="icon-name">${icon.name}</div>
    </div>
  `).join('');
}

function openModal(icon) {
  currentIcon = icon;
  const size = getIconSize();
  const strokeWidth = getStrokeWidth();
  const color = getColor();

  const libBadge = icon.lib === 'feather'
    ? '<span class="lib-badge" style="background:rgba(34,197,94,.12);color:#22c55e">Feather</span>'
    : '<span class="lib-badge" style="background:rgba(249,115,22,.12);color:#f97316">Lucide</span>';

  modalTitle.innerHTML = icon.name + ' ' + libBadge;
  modalPreview.innerHTML = makeSVG(icon, Math.max(size, 64), strokeWidth, color);
  modalTags.innerHTML = icon.tags.map(t => `<span class="tag">${t}</span>`).join('');

  const svgCode = makeSVG(icon, size, strokeWidth, color);
  codeContent.textContent = svgCode;
  modalOverlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalOverlay.classList.remove('show');
  document.body.style.overflow = '';
  currentIcon = null;
}

function showToast(msg) {
  const toast = $('#toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function downloadSVG() {
  if (!currentIcon) return;
  const svg = makeSVG(currentIcon, getIconSize(), getStrokeWidth(), getColor());
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentIcon.name}.svg`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('SVG downloaded!');
}

function downloadPNG() {
  if (!currentIcon) return;
  const size = getIconSize() * 4;
  const svg = makeSVG(currentIcon, size, getStrokeWidth() * (size / 24), getColor());
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `${currentIcon.name}.png`;
    a.click();
    showToast('PNG downloaded!');
  };
  img.src = url;
}

function copySVGCode() {
  if (!currentIcon) return;
  const svg = makeSVG(currentIcon, getIconSize(), getStrokeWidth(), getColor());
  navigator.clipboard.writeText(svg).then(() => showToast('SVG code copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = svg;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('SVG code copied!');
  });
}

// Event listeners
searchInput.addEventListener('input', renderGrid);
searchClear.addEventListener('click', () => { searchInput.value = ''; renderGrid(); searchInput.focus(); });

sizeRange.addEventListener('input', () => { sizeVal.textContent = sizeRange.value; renderGrid(); if (currentIcon) openModal(currentIcon); });
strokeRange.addEventListener('input', () => { strokeVal.textContent = strokeRange.value; renderGrid(); if (currentIcon) openModal(currentIcon); });
colorPicker.addEventListener('input', () => { renderGrid(); if (currentIcon) openModal(currentIcon); });

grid.addEventListener('click', e => {
  const card = e.target.closest('.icon-card');
  if (!card) return;
  const idx = parseInt(card.dataset.index);
  openModal(ALL_ICONS[idx]);
});
grid.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const card = e.target.closest('.icon-card');
    if (!card) return;
    e.preventDefault();
    const idx = parseInt(card.dataset.index);
    openModal(ALL_ICONS[idx]);
  }
});

$('#modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

$('#btnSvgDownload').addEventListener('click', downloadSVG);
$('#btnPngDownload').addEventListener('click', downloadPNG);
$('#btnCopyCode').addEventListener('click', copySVGCode);
$('#btnCodeCopy').addEventListener('click', copySVGCode);

$$('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

// Keyboard shortcut: focus search with /
document.addEventListener('keydown', e => {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// Init
renderGrid();

</script>
